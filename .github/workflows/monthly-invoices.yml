name: Monthly Invoices

on:
  push:
    branches:
      - dev
  schedule:
    # The simplest possible schedule for every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call invoice generation API
        run: |
          curl -X POST https://dev.akanksha.org/api/generate-monthly-invoices \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
