name: Monthly Invoices

on:
  schedule:
   
       # Run at 00:30 UTC (6:00 AM IST) on the 3rd day of every month
    - cron: "45 12 * * *"

  workflow_dispatch:        # Allows manual runs
    
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call invoice generation API
        run: |
          curl -X POST https://dev.akanksha.org/api/generate-monthly-invoices \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"