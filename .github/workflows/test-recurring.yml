name: Test Recurring Flow (One-off 21 Sept)

on:
  schedule:
    # Invoices → 21 Sept 20:00 IST (14:30 UTC)
    - cron: "30 14 21 9 *"

    # Mandate Sync → 21 Sept 21:00 IST (15:30 UTC)
    - cron: "30 15 21 9 *"

    # Debit Invoices → 21 Sept 22:00 IST (16:30 UTC)
    - cron: "30 16 21 9 *"

  workflow_dispatch: # allow manual run for testing

jobs:
  invoices:
    if: github.event.schedule == '30 14 21 9 *'
    runs-on: ubuntu-latest
    steps:
      - name: Call invoice generation API
        run: |
          curl -X POST https://165.232.186.251/api/generate-monthly-invoices \
            -H "Host: dev.akanksha.org" \
            -H "Authorization: Bearer akanksha-cron-2025-strongsecret" \
            -H "Content-Type: application/json"

  mandate_sync:
    if: github.event.schedule == '30 15 21 9 *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mandate Sync API
        run: |
          curl -X POST https://165.232.186.251/api/mandate-sync \
            -H "Host: dev.akanksha.org" \
            -H "Authorization: Bearer akanksha-cron-2025-strongsecret" \
            -H "Content-Type: application/json"

  debit:
    if: github.event.schedule == '30 16 21 9 *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Debit Invoices API
        run: |
          curl -X POST https://165.232.186.251/api/debit-invoices \
            -H "Host: dev.akanksha.org" \
            -H "Authorization: Bearer akanksha-cron-2025-strongsecret" \
            -H "Content-Type: application/json"
