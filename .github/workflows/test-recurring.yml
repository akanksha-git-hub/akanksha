name: Test Recurring Flow (One-off 21 Sept)

on:
  schedule:
    # Invoices → 21 Sept 20:30 IST (15:00 UTC)
    - cron: "0 15 21 9 *"

    # Mandate Sync → 21 Sept 21:00 IST (15:30 UTC)
    - cron: "30 15 21 9 *"

   
    - cron: "30 0 22 9 *"

  workflow_dispatch: # allow manual run for testing

jobs:
  invoices:
    runs-on: ubuntu-latest
    steps:
      - name: Call invoice generation API
        run: |
          curl -X POST https://dev.akanksha.org/api/generate-monthly-invoices \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  mandate_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mandate Sync API
        run: |
          curl -X POST https://dev.akanksha.org/api/mandate-sync \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  debit:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Debit Invoices API
        run: |
          curl -X POST https://dev.akanksha.org/api/debit-invoices \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
