name: Debit Invoices

on:
  schedule:
    # Run at 06:00 IST (00:30 UTC) on the 5th of every month
    - cron: "30 0 5 * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  debit:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Debit Cron API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://dev.akanksha.org/api/debit-invoices
