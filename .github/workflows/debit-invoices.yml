name: Debit Invoices

on:
  schedule:
        # Run today at 12:05 PM IST (06:35 UTC)
    - cron: "45 10 * * *"

  workflow_dispatch: # Allow manual trigger for testing

jobs:
  debit:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Debit Cron API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://dev.akanksha.org/api/debit-invoices
