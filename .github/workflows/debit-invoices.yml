name: Debit Invoices

on:
  schedule:
    # Run at 04:30 UTC (10:00 AM IST) on the 5th day of every month
    - cron: "30 4 5 * *"

  workflow_dispatch: # Allow manual trigger for testing

jobs:
  debit:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Debit Cron API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://dev.akanksha.org/api/debit-invoices
