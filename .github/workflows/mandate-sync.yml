name: Mandate Sync

on:
  schedule:
    # Run daily at 12:00 PM IST (06:30 UTC)
    - cron: "30 6 * * *"
  workflow_dispatch: # allow manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mandate Sync API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://dev.akanksha.org/api/mandate-sync
